version: "3"

tasks:
    help:
        desc: "Show all available tasks"
        cmds:
            - echo "Available tasks:"
            - task --list

    list:
        desc: "Alias for help"
        cmds:
            - task help

    # -----------------------------
    # Python environment management
    # -----------------------------
    vvup:
        desc: "Update Python requirements"
        cmds:
            - pip install -r requirements.txt
            - pip freeze > requirements.txt

    # -----------------------------
    # Node / TypeScript
    # -----------------------------
    in:
        desc: "Install Node packages"
        cmds:
            - arch -arm64 npm install

    up:
        desc: "Update Node packages"
        cmds:
            - arch -arm64 npm update

    bd:
        desc: "Build TypeScript → dist/"
        cmds:
            - arch -arm64 npx tsc

    tst:
        desc: "Run tests against compiled JS"
        cmds:
            - task bd
            - arch -arm64 node dist/ha_core/transform/anchor.test.js
            - arch -arm64 node dist/ha_proxy/test-provider.js
            - arch -arm64 node dist/ha_learn/test-learn.js
            - echo "task completed successfully"

    # -----------------------------
    # Runtime servers (compiled JS)
    # -----------------------------
    proxy:
        desc: "Start SMAGE proxy server (dist)"
        cmds:
            - arch -arm64 node dist/ha_proxy/server.js

    mcp:
        desc: "Start MCP server (dist)"
        cmds:
            - arch -arm64 node dist/ha_mcp/server.js

    agent:
        desc: "Run agent wrapper test (dist)"
        cmds:
            - arch -arm64 node dist/ha_cli/main.js agent

    learn:
        desc: "Run learning engine (dist)"
        cmds:
            - arch -arm64 node dist/ha_cli/main.js learn test-session

    # -----------------------------
    # Full system checks
    # -----------------------------
    chk:
        desc: "Run full system check"
        cmds:
            - task bd
            - task tst
            - task learn
            - task proxy

    # -----------------------------
    # Documentation
    # -----------------------------
    docs:
        desc: "Generate SMAGE documentation"
        cmds:
            - arch -arm64 node dist/ha_cli/main.js docs

    docsite:
        desc: "Generate SMAGE HTML documentation"
        cmds:
            - arch -arm64 node dist/ha_cli/main.js docs:html
