version: "3"

tasks:
    help:
        desc: "Show all available tasks"
        cmds:
            - echo "Available tasks:"
            - task --list

    list:
        desc: "Alias for help"
        cmds:
            - task help

    vvup:
        desc: "Update Python requirements"
        cmds:
            - pip install -r requirements.txt
            - pip freeze > requirements.txt

    in:
        desc: "Install Node packages"
        cmds:
            - arch -arm64 npm install

    up:
        desc: "Update Node packages"
        cmds:
            - arch -arm64 npm update

    bd:
        desc: "Build TypeScript"
        cmds:
            - arch -arm64 npx tsc

    tst:
        desc: "Run TypeScript tests"
        cmds:
            - arch -arm64 npx tsx ha_proxy/test-provider.ts
            - arch -arm64 npx tsx ha_learn/test-learn.ts

    proxy:
        desc: "Start SMAGE proxy server"
        cmds:
            - arch -arm64 node --require ts-node/register ha_proxy/server.ts

    mcp:
        desc: "Start MCP server"
        cmds:
            - arch -arm64 node --require ts-node/register ha_mcp/server.ts

    agent:
        desc: "Run agent wrapper test"
        cmds:
            - arch -arm64 node --require ts-node/register ha_cli/main.ts agent

    learn:
        desc: "Run learning engine"
        cmds:
            - arch -arm64 node --require ts-node/register ha_cli/main.ts learn test-session

    chk:
        desc: "Run full system check"
        cmds:
            - task bd
            - task tst
            - task learn
            - task proxy

    docs:
        desc: "Generate SMAGE documentation"
        cmds:
            - arch -arm64 node --require ts-node/register ha_cli/main.ts docs

    docsite:
        desc: "Generate SMAGE HTML documentation"
        cmds:
            - arch -arm64 node --require ts-node/register ha_cli/main.ts docs:html
