version: '3'

tasks:
  bd:
    desc: Build dist
    cmds:
      - arch -arm64 npx tsc

  prod:
    desc: Run SMAGE agent + MCP in production mode
    cmds:
      - arch -arm64 node dist/ha_mcp/server.js

  tst:
    desc: Run provider + MCP tests (prod)
    cmds:
      - task bd
      - arch -arm64 node dist/ha_proxy/test-provider.js

  learn:
    desc: Run SMAGE learn tests (prod)
    cmds:
      - task bd
      - arch -arm64 node dist/ha_learn/test-learn.js
